<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#2ecc71"/>
  <g transform="translate(16,16)">
    <!-- Solar panel -->
    <rect x="-10" y="-8" width="20" height="16" fill="#1a5490" stroke="#fff" stroke-width="0.5"/>
    <!-- Panel grid lines -->
    <line x1="-10" y1="-4" x2="10" y2="-4" stroke="#fff" stroke-width="0.5"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="-10" y1="4" x2="10" y2="4" stroke="#fff" stroke-width="0.5"/>
    <line x1="-5" y1="-8" x2="-5" y2="8" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#fff" stroke-width="0.5"/>
    <line x1="5" y1="-8" x2="5" y2="8" stroke="#fff" stroke-width="0.5"/>
    <!-- Sun rays on top -->
    <circle cx="0" cy="-12" r="2" fill="#ffd700"/>
    <line x1="0" y1="-15" x2="0" y2="-18" stroke="#ffd700" stroke-width="1"/>
    <line x1="3" y1="-12" x2="5" y2="-14" stroke="#ffd700" stroke-width="1"/>
    <line x1="-3" y1="-12" x2="-5" y2="-14" stroke="#ffd700" stroke-width="1"/>
  </g>
</svg>
