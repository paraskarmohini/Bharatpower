<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#2ecc71"/>
  <g transform="translate(16,16)">
    <!-- Sun circle -->
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/>
    <!-- Sun rays -->
    <rect x="-1" y="-10" width="2" height="4" fill="#fff" opacity="0.8"/>
    <rect x="-1" y="6" width="2" height="4" fill="#fff" opacity="0.8"/>
    <rect x="-10" y="-1" width="4" height="2" fill="#fff" opacity="0.8"/>
    <rect x="6" y="-1" width="4" height="2" fill="#fff" opacity="0.8"/>
    <!-- Diagonal rays -->
    <rect x="5" y="5" width="3" height="2" fill="#fff" opacity="0.6" transform="rotate(45 6.5 6)"/>
    <rect x="-8" y="5" width="3" height="2" fill="#fff" opacity="0.6" transform="rotate(-45 -6.5 6)"/>
    <rect x="5" y="-7" width="3" height="2" fill="#fff" opacity="0.6" transform="rotate(-45 6.5 -6)"/>
    <rect x="-8" y="-7" width="3" height="2" fill="#fff" opacity="0.6" transform="rotate(45 -6.5 -6)"/>
  </g>
</svg>
